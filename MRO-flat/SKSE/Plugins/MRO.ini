[Hooks]
; Native physical-DR hook (M2). 1 = on (DEFAULT: per-hit exact curve;
; Papyrus perk ladder stands down automatically), 0 = off (fall back to
; the Papyrus perk ladder). The hook self-verifies its code site and
; refuses to install on an unexpected game binary — check MRO.log.
bPhysicalDRHook=1

; Native elemental-absorb hook (M3). 1 = on (DEFAULT: heals from the real
; skill/perk/dual-cast-scaled per-hit magnitude; Papyrus absorb stands
; down automatically), 0 = off (fall back to the Papyrus OnHit absorb,
; which only sees a spell's authored base magnitude and reads too small).
; Self-verifies its code site and refuses to install on an unexpected
; game binary — check MRO.log.
bAbsorbHook=1
