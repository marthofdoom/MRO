[Hooks]
; Native physical-DR hook (M2). 0 = off (Papyrus perk ladder handles DR),
; 1 = on (per-hit exact curve; ladder stands down automatically).
; The hook self-verifies its code site and refuses to install on an
; unexpected game binary — check MRO.log after enabling.
bPhysicalDRHook=0

; Native elemental-absorb hook (M3). 0 = off (Papyrus OnHit absorb, which
; only sees a spell's authored base magnitude — reads too small), 1 = on
; (heals from the real skill/perk/dual-cast-scaled per-hit magnitude; the
; Papyrus absorb stands down automatically). Self-verifies its code site
; and refuses to install on an unexpected game binary — check MRO.log.
bAbsorbHook=0
