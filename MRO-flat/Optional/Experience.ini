[Killing]
; Kill XP matches Faster Leveling's rate (fKillingMult = 2.0).
; Group bonus is new — fighting multiple enemies at once rewards aggression.
; Boss bonus (fMaxLevelMult) reduced from Faster Leveling's 10.0 to 5.0
; so elite kills are rewarding without being exponentially faster to level via.
fLevelFactor      = 0.800000
fGroupFactor      = 0.200000
fMaxLevelMult     = 5.000000
fDamageThreshold  = 0.200000
fKillingMult      = 2.000000


