; Marth Requiem Overhaul — FF-style Experience.ini
; Target speed: same as LoreRim's "Faster Leveling" optional
; Source weighting: kills > quests > clearing > discovery
; This overrides SKSE/Plugins/Experience.ini when installed via FOMOD.
; Only install if Experience.esp is in your load order.

[General]
bEnableKilling  = true
bEnableReading  = false
bEnableSkillXP  = false
iMaxPlayerLevel = 201
fSkillCapBase   = 50.000000
fSkillCapMult   = 1.000000
bUseRacialCaps  = false
bShowMessages   = true
sMessageFormat  = {:+d} XP
iMeterMode      = 1


[Questing]
; Quests feel like FF story milestones — completing them matters.
; Main / DLC quests boosted above Faster Leveling baseline.
; Small quest-objective reward per stage (10 XP) adds up for long quests.
iXPQuestObjectives  = 10
iXPQuestNone        = 0
iXPQuestMain        = 500
iXPQuestCollege     = 225
iXPQuestThieves     = 225
iXPQuestBrotherhood = 225
iXPQuestCompanions  = 225
iXPQuestMisc        = 25
iXPQuestDaedric     = 375
iXPQuestSide        = 225
iXPQuestCivilWar    = 325
iXPQuestDawnguard   = 450
iXPQuestDragonborn  = 450


